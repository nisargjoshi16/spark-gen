name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build on GitHub
        run: |
          npm ci
          npm run build

      - name: Pack release tarball
        run: bash deploy/package-release.sh

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: ~/spark-gen/

      - name: Install on server and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd ~/spark-gen
            git pull origin main --quiet || true
            bash deploy/remote-deploy.sh
            NPM_PATH="$(command -v npm)"
            sed \
              -e "s|__APP_DIR__|${HOME}/spark-gen|g" \
              -e "s|__USER__|${USER}|g" \
              -e "s|__NPM_PATH__|${NPM_PATH}|g" \
              deploy/spark-gen.service | sudo tee /etc/systemd/system/spark-gen.service >/dev/null
            printf '%s\n' \
              'NODE_ENV=production' \
              'HOSTNAME=0.0.0.0' \
              'PORT=3000' \
              "APP_PASSWORD=${{ secrets.APP_PASSWORD }}" \
              "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "GENERATE_API_SECRET=${{ secrets.GENERATE_API_SECRET }}" \
              "ORG_PIN_PRACHODAYAT=${{ secrets.ORG_PIN_PRACHODAYAT }}" \
              "ORG_PIN_SHARDUL=${{ secrets.ORG_PIN_SHARDUL }}" \
              > .env
            sudo systemctl daemon-reload
            sudo systemctl enable spark-gen
            sudo systemctl restart spark-gen
            echo "Deploy complete — spark-gen restarted"